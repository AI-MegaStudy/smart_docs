<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1900" viewBox="0 0 1600 1900">
  <defs>
    <style>
      .page { fill: #fbfaf7; }
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #16211f; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 21px; font-weight: 600; fill: #53615d; }
      .code { font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #1f5a42; }
      .lane { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      .node-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111817; text-anchor: middle; }
      .node-sub { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #53615d; text-anchor: middle; }
      .state-code { font-family: Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #49615b; text-anchor: middle; }
      .edge { fill: none; stroke: #1f2933; stroke-width: 4; }
      .edge-soft { fill: none; stroke: #6f7b76; stroke-width: 3; }
      .arrowhead { fill: #1f2933; }
      .arrowhead-soft { fill: #6f7b76; }
      .yesno { font-family: Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #111817; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="1900"/>
  <rect x="42" y="42" width="1516" height="1816" fill="none" stroke="#cfd8d2" stroke-width="2"/>

  <text class="code" x="96" y="110">07-2</text>
  <text class="title" x="170" y="112">출고·배송 상태 생명주기</text>
  <text class="subtitle" x="96" y="160">점주 발주 결정 이후 선별과 배송 완료까지 이어지는 상태 전이</text>

  <g id="lanes">
    <rect x="112" y="278" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="306">발주</text>
    <rect x="112" y="850" width="126" height="42" rx="21" fill="#596d82"/>
    <text class="lane" x="175" y="878">선별</text>
    <rect x="112" y="1270" width="126" height="42" rx="21" fill="#496fae"/>
    <text class="lane" x="175" y="1298">배송</text>
  </g>

  <g id="flow">
    <rect x="540" y="235" width="520" height="116" rx="58" fill="#d9ebff" stroke="#4d7fc7" stroke-width="4"/>
    <text class="node-title" x="800" y="286">시작</text>
    <text class="node-sub" x="800" y="322">PROCUREMENT_REQUESTED</text>

    <path class="edge" d="M800 351 L800 422"/>
    <polygon points="800,422 1130,572 800,722 470,572" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="536">점주가 발주를</text>
    <text class="node-title" x="800" y="576">승인했는가?</text>
    <text class="node-sub" x="800" y="624">전량 또는 부분 승인</text>

    <path class="edge-soft" d="M470 572 L392 572"/>
    <text class="yesno" x="420" y="550">N</text>
    <rect x="124" y="502" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="552">발주 거절</text>
    <text class="state-code" x="258" y="590">REJECTED</text>
    <text class="node-sub" x="258" y="620">취소 또는 환불</text>

    <path class="edge" d="M800 722 L800 794"/>
    <text class="yesno" x="858" y="758">Y</text>
    <rect x="540" y="794" width="520" height="116" rx="10" fill="#eef2f6" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="840">선별 진행</text>
    <text class="state-code" x="800" y="878">QUALITY_CHECKING</text>

    <path class="edge" d="M800 910 L800 982"/>
    <rect x="540" y="982" width="520" height="116" rx="10" fill="#e9f6ff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1028">배송 준비</text>
    <text class="state-code" x="800" y="1066">READY_TO_SHIP</text>

    <path class="edge" d="M800 1098 L800 1170"/>
    <rect x="540" y="1170" width="520" height="116" rx="10" fill="#e9f6ff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1216">배송 진행</text>
    <text class="state-code" x="800" y="1254">SHIPPED</text>

    <path class="edge" d="M800 1286 L800 1358"/>
    <rect x="540" y="1358" width="520" height="116" rx="10" fill="#e9f6ff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1404">배송 완료</text>
    <text class="state-code" x="800" y="1442">DELIVERED</text>

    <path class="edge" d="M800 1474 L800 1546"/>
    <polygon points="800,1546 1130,1696 800,1846 470,1696" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1660">다음 상태</text>
    <text class="node-title" x="800" y="1700">반품 요청 여부</text>
    <text class="node-sub" x="800" y="1748">07-3으로 연결</text>

    <polygon class="arrowhead" points="800,422 784,390 816,390"/>
    <polygon class="arrowhead-soft" points="392,572 424,556 424,588"/>
    <polygon class="arrowhead" points="800,794 784,762 816,762"/>
    <polygon class="arrowhead" points="800,982 784,950 816,950"/>
    <polygon class="arrowhead" points="800,1170 784,1138 816,1138"/>
    <polygon class="arrowhead" points="800,1358 784,1326 816,1326"/>
    <polygon class="arrowhead" points="800,1546 784,1514 816,1514"/>
  </g>
</svg>
