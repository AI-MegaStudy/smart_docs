<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" viewBox="0 0 1600 2560">
  <defs>
    <style>
      .page { fill: #fbfaf7; }
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #16211f; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 21px; font-weight: 600; fill: #53615d; }
      .code { font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #1f5a42; }
      .lane { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      .node-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111817; text-anchor: middle; }
      .node-sub { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #53615d; text-anchor: middle; }
      .edge { fill: none; stroke: #1f2933; stroke-width: 4; }
      .edge-soft { fill: none; stroke: #6f7b76; stroke-width: 3; }
      .arrowhead { fill: #1f2933; }
      .arrowhead-soft { fill: #6f7b76; }
      .yesno { font-family: Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #111817; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2560"/>
  <rect x="42" y="42" width="1516" height="2476" fill="none" stroke="#cfd8d2" stroke-width="2"/>

  <text class="code" x="96" y="110">03</text>
  <text class="title" x="158" y="112">고객 예약 생성 플로우</text>
  <text class="subtitle" x="96" y="160">로컬 예약함의 선택 품목을 서버 예약으로 전환하고 슬롯 수량을 임시 점유하는 흐름</text>

  <g id="lanes">
    <rect x="112" y="278" width="126" height="42" rx="21" fill="#496fae"/>
    <text class="lane" x="175" y="306">고객</text>
    <rect x="112" y="1070" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="1098">로컬</text>
    <rect x="112" y="1530" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="1558">서버</text>
    <rect x="112" y="1862" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="1890">DB</text>
  </g>

  <g id="flow">
    <rect x="540" y="235" width="520" height="116" rx="58" fill="#d9ebff" stroke="#4d7fc7" stroke-width="4"/>
    <text class="node-title" x="800" y="286">시작</text>
    <text class="node-sub" x="800" y="322">고객 예약웹 진입</text>

    <path class="edge" d="M800 351 L800 422"/>
    <rect x="540" y="422" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="472">예약 가능 상품 조회</text>
    <text class="node-sub" x="800" y="509">상품 목록과 열린 슬롯 표시</text>
    <text class="node-sub" x="800" y="539">OPEN 슬롯 우선 노출</text>

    <path class="edge" d="M800 554 L800 626"/>
    <polygon points="800,626 1130,776 800,926 470,776" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="740">원하는 상품과</text>
    <text class="node-title" x="800" y="780">슬롯이 있는가?</text>
    <text class="node-sub" x="800" y="828">수확 기간, 가격, 수량 확인</text>

    <path class="edge-soft" d="M470 776 L392 776"/>
    <text class="yesno" x="420" y="754">N</text>
    <rect x="124" y="706" width="268" height="140" rx="10" fill="#fff6e6" stroke="#9b6b28" stroke-width="3"/>
    <text class="node-title" x="258" y="756">탐색 계속</text>
    <text class="node-sub" x="258" y="794">필터 또는 다른 상품을</text>
    <text class="node-sub" x="258" y="824">다시 확인</text>

    <path class="edge" d="M800 926 L800 998"/>
    <text class="yesno" x="858" y="962">Y</text>
    <polygon points="626,998 1130,998 974,1138 470,1138" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1054">상품 상세에서</text>
    <text class="node-title" x="800" y="1094">수량 선택</text>
    <text class="node-sub" x="800" y="1128">포장 개수와 kg 확인</text>

    <path class="edge" d="M800 1138 L800 1210"/>
    <polygon points="800,1210 1130,1360 800,1510 470,1360" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1324">화면 기준 수량이</text>
    <text class="node-title" x="800" y="1364">충분한가?</text>
    <text class="node-sub" x="800" y="1412">최종 검증은 서버에서 수행</text>

    <path class="edge-soft" d="M470 1360 L392 1360"/>
    <text class="yesno" x="420" y="1338">N</text>
    <rect x="124" y="1290" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="1340">수량 조정</text>
    <text class="node-sub" x="258" y="1378">선택 수량을 줄이거나</text>
    <text class="node-sub" x="258" y="1408">다른 슬롯 선택</text>

    <path class="edge" d="M800 1510 L800 1582"/>
    <text class="yesno" x="858" y="1546">Y</text>
    <rect x="540" y="1582" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1632">로컬 예약함 담기</text>
    <text class="node-sub" x="800" y="1669">브라우저 상태에 임시 저장</text>
    <text class="node-sub" x="800" y="1699">서버 기록 없음</text>

    <path class="edge" d="M800 1714 L800 1786"/>
    <polygon points="626,1786 1130,1786 974,1926 470,1926" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1842">예약 확인</text>
    <text class="node-sub" x="800" y="1880">품목, 수확 기간, 가격</text>
    <text class="node-sub" x="800" y="1910">예약 점유 시간 안내</text>

    <path class="edge" d="M800 1926 L800 1998"/>
    <rect x="540" y="1998" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="2048">서버 예약 생성 요청</text>
    <text class="node-sub" x="800" y="2085">POST /reservations</text>
    <text class="node-sub" x="800" y="2115">서버가 최종 검증</text>

    <path class="edge" d="M800 2130 L800 2190"/>
    <path d="M610 2242 C610 2208 990 2208 990 2242 L990 2382 C990 2416 610 2416 610 2382 Z" fill="#e4f7ed" stroke="#247a55" stroke-width="4"/>
    <ellipse cx="800" cy="2242" rx="190" ry="46" fill="#f2fff8" stroke="#247a55" stroke-width="4"/>
    <text class="node-title" x="800" y="2332">슬롯 행 잠금</text>
    <text class="node-sub" x="800" y="2374">available_kg 확인</text>

    <path class="edge-soft" d="M990 2312 L1210 2312"/>
    <text class="yesno" x="1060" y="2290">N</text>
    <rect x="1210" y="2242" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="1344" y="2292">예약 실패</text>
    <text class="node-sub" x="1344" y="2330">수량 부족 또는</text>
    <text class="node-sub" x="1344" y="2360">슬롯 마감 안내</text>

    <path class="edge" d="M800 2420 L800 2464"/>
    <text class="yesno" x="858" y="2448">Y</text>
    <rect x="540" y="2464" width="520" height="52" rx="26" fill="#dff5e9" stroke="#2f7c59" stroke-width="4"/>
    <text class="node-title" x="800" y="2499">예약 생성 완료</text>

    <polygon class="arrowhead" points="800,422 784,390 816,390"/>
    <polygon class="arrowhead" points="800,626 784,594 816,594"/>
    <polygon class="arrowhead-soft" points="392,776 424,760 424,792"/>
    <polygon class="arrowhead" points="800,998 784,966 816,966"/>
    <polygon class="arrowhead" points="800,1210 784,1178 816,1178"/>
    <polygon class="arrowhead-soft" points="392,1360 424,1344 424,1376"/>
    <polygon class="arrowhead" points="800,1582 784,1550 816,1550"/>
    <polygon class="arrowhead" points="800,1786 784,1754 816,1754"/>
    <polygon class="arrowhead" points="800,1998 784,1966 816,1966"/>
    <polygon class="arrowhead" points="800,2190 784,2158 816,2158"/>
    <polygon class="arrowhead-soft" points="1210,2312 1178,2296 1178,2328"/>
    <polygon class="arrowhead" points="800,2464 784,2432 816,2432"/>
  </g>
</svg>
