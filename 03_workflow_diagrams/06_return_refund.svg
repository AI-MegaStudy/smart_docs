<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2380" viewBox="0 0 1600 2380">
  <defs>
    <style>
      .page { fill: #fbfaf7; }
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #16211f; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 21px; font-weight: 600; fill: #53615d; }
      .code { font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #1f5a42; }
      .lane { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      .node-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111817; text-anchor: middle; }
      .node-sub { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #53615d; text-anchor: middle; }
      .edge { fill: none; stroke: #1f2933; stroke-width: 4; }
      .edge-soft { fill: none; stroke: #6f7b76; stroke-width: 3; }
      .arrowhead { fill: #1f2933; }
      .arrowhead-soft { fill: #6f7b76; }
      .yesno { font-family: Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #111817; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2380"/>
  <rect x="42" y="42" width="1516" height="2296" fill="none" stroke="#cfd8d2" stroke-width="2"/>

  <text class="code" x="96" y="110">06</text>
  <text class="title" x="158" y="112">반품·환불 플로우</text>
  <text class="subtitle" x="96" y="160">배송 완료 주문에 대해 고객이 반품을 요청하고 점주 결정 후 환불까지 처리하는 흐름</text>

  <g id="lanes">
    <rect x="112" y="278" width="126" height="42" rx="21" fill="#496fae"/>
    <text class="lane" x="175" y="306">고객</text>
    <rect x="112" y="922" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="950">서버</text>
    <rect x="112" y="1296" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="1324">점주</text>
    <rect x="112" y="2046" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="2074">결제</text>
  </g>

  <g id="flow">
    <rect x="540" y="235" width="520" height="116" rx="58" fill="#d9ebff" stroke="#4d7fc7" stroke-width="4"/>
    <text class="node-title" x="800" y="286">시작</text>
    <text class="node-sub" x="800" y="322">배송 완료 주문 상세</text>

    <path class="edge" d="M800 351 L800 422"/>
    <polygon points="800,422 1130,572 800,722 470,572" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="536">반품 신청이</text>
    <text class="node-title" x="800" y="576">가능한 상태인가?</text>
    <text class="node-sub" x="800" y="624">DELIVERED 주문만 허용</text>

    <path class="edge-soft" d="M470 572 L392 572"/>
    <text class="yesno" x="420" y="550">N</text>
    <rect x="124" y="502" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="552">신청 불가</text>
    <text class="node-sub" x="258" y="590">배송 완료 전 또는</text>
    <text class="node-sub" x="258" y="620">이미 처리된 주문</text>

    <path class="edge" d="M800 722 L800 794"/>
    <text class="yesno" x="858" y="758">Y</text>
    <polygon points="626,794 1130,794 974,934 470,934" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="850">반품 사유 입력</text>
    <text class="node-sub" x="800" y="888">사유 코드, 상세 사유</text>
    <text class="node-sub" x="800" y="918">증빙 이미지, 요청 금액</text>

    <path class="edge" d="M800 934 L800 1006"/>
    <rect x="540" y="1006" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1056">반품 요청 등록</text>
    <text class="node-sub" x="800" y="1093">return_requests 생성</text>
    <text class="node-sub" x="800" y="1123">orders RETURN_REQUESTED</text>

    <path class="edge" d="M800 1138 L800 1210"/>
    <path d="M610 1262 C610 1228 990 1228 990 1262 L990 1402 C990 1436 610 1436 610 1402 Z" fill="#e4f7ed" stroke="#247a55" stroke-width="4"/>
    <ellipse cx="800" cy="1262" rx="190" ry="46" fill="#f2fff8" stroke="#247a55" stroke-width="4"/>
    <text class="node-title" x="800" y="1352">반품 요청 대기</text>
    <text class="node-sub" x="800" y="1394">점주 확인 필요</text>

    <path class="edge" d="M800 1440 L800 1512"/>
    <rect x="540" y="1512" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1562">점주 반품 검토</text>
    <text class="node-sub" x="800" y="1599">사유, 증빙, 정책 확인</text>
    <text class="node-sub" x="800" y="1629">승인 금액 입력</text>

    <path class="edge" d="M800 1644 L800 1716"/>
    <polygon points="800,1716 1130,1866 800,2016 470,1866" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1830">점주가 반품을</text>
    <text class="node-title" x="800" y="1870">승인했는가?</text>
    <text class="node-sub" x="800" y="1918">승인 또는 거절 결정</text>

    <path class="edge-soft" d="M470 1866 L392 1866"/>
    <text class="yesno" x="420" y="1844">N</text>
    <rect x="124" y="1796" width="268" height="140" rx="10" fill="#fff6e6" stroke="#9b6b28" stroke-width="3"/>
    <text class="node-title" x="258" y="1846">반품 거절</text>
    <text class="node-sub" x="258" y="1884">거절 사유 저장</text>
    <text class="node-sub" x="258" y="1914">고객 주문 상세 노출</text>

    <path class="edge" d="M800 2016 L800 2088"/>
    <text class="yesno" x="858" y="2052">Y</text>
    <rect x="540" y="2088" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="2138">Mock 환불 처리</text>
    <text class="node-sub" x="800" y="2175">refunds 생성 또는 갱신</text>
    <text class="node-sub" x="800" y="2205">payments REFUNDED</text>

    <path class="edge" d="M800 2220 L800 2284"/>
    <rect x="540" y="2284" width="520" height="52" rx="26" fill="#dff5e9" stroke="#2f7c59" stroke-width="4"/>
    <text class="node-title" x="800" y="2319">환불 완료</text>

    <polygon class="arrowhead" points="800,422 784,390 816,390"/>
    <polygon class="arrowhead-soft" points="392,572 424,556 424,588"/>
    <polygon class="arrowhead" points="800,794 784,762 816,762"/>
    <polygon class="arrowhead" points="800,1006 784,974 816,974"/>
    <polygon class="arrowhead" points="800,1210 784,1178 816,1178"/>
    <polygon class="arrowhead" points="800,1512 784,1480 816,1480"/>
    <polygon class="arrowhead" points="800,1716 784,1684 816,1684"/>
    <polygon class="arrowhead-soft" points="392,1866 424,1850 424,1882"/>
    <polygon class="arrowhead" points="800,2088 784,2056 816,2056"/>
    <polygon class="arrowhead" points="800,2284 784,2252 816,2252"/>
  </g>
</svg>
