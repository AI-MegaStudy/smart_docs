<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로세스 플로우 다이어그램</title>
  <style>
    :root {
      --ink: #111815;
      --muted: #58655e;
      --paper: #fffef9;
      --bg: #f3f4ee;
      --green: #1f5a42;
      --panel: #ffffff;
      --panel-line: #d4ddd5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      letter-spacing: 0;
    }

    header {
      min-height: 78px;
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background: rgba(255, 254, 249, .96);
      border-bottom: 1px solid #d7ded7;
    }

    h1, h2, h3, h4, p { margin: 0; }
    h1 { font-size: 22px; line-height: 1.22; font-weight: 900; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }

    main {
      width: min(100%, 1680px);
      margin: 0 auto;
      padding: 24px;
    }

    .sheet {
      background: var(--paper);
      border: 1px solid #d6ddd6;
      box-shadow: 0 20px 60px rgba(17, 24, 21, .08);
      padding: 30px;
    }

    .sheet-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .sheet-title { font-size: 26px; font-weight: 900; }
    .sheet-desc { margin-top: 6px; color: var(--muted); font-size: 14px; }

    .diagram-groups {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .diagram-group-title {
      margin-bottom: 12px;
      font-size: 20px;
      font-weight: 900;
    }

    .diagram-group-desc {
      margin: -6px 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .diagram-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .diagram-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--panel-line);
    }

    .diagram-info {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid #edf1ec;
    }

    .diagram-id {
      flex: 0 0 auto;
      min-width: 52px;
      color: var(--green);
      font-size: 15px;
      font-weight: 900;
    }

    .diagram-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }

    .diagram-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .diagram-links {
      display: flex;
      gap: 8px;
      margin-left: auto;
      white-space: nowrap;
    }

    .diagram-links a {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      background: #f7f9f5;
      border: 1px solid #cfd8d1;
      border-radius: 999px;
    }

    .diagram-links a:hover,
    .diagram-links a:focus-visible {
      color: #ffffff;
      background: var(--green);
      border-color: var(--green);
      outline: none;
    }

    .diagram-preview {
      display: block;
      width: 100%;
      height: 520px;
      object-fit: contain;
      background: #fffefb;
    }

    @media (max-width: 1320px) {
      main { width: 100%; }
      .diagram-grid { grid-template-columns: 1fr; }
      .sheet-head { display: block; }
      .diagram-info { flex-wrap: wrap; }
      .diagram-links { margin-left: 64px; }
    }

    @media (max-width: 720px) {
      header { display: block; }
      main { padding: 14px; }
      .sheet { padding: 18px; }
      .diagram-preview { height: 360px; }
      .diagram-links { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>프로세스 플로우 다이어그램</h1>
      <p class="sub">PPT에 바로 넣을 수 있도록 큰 로직 흐름 단위로 정리한 PNG/SVG 플로우 산출물</p>
    </div>
  </header>

  <main>
    <section id="exports" class="sheet">
      <div class="sheet-head">
        <div>
          <h2 class="sheet-title">PPT 삽입용 대형 플로우 이미지</h2>
          <p class="sheet-desc">완성된 PNG/SVG 다이어그램을 큰 로직 흐름 단위로 나누어 연결했습니다. 긴 흐름은 2~3개 파트로 분리했습니다.</p>
        </div>
      </div>
      <div id="diagramGrid" class="diagram-groups"></div>
    </section>
  </main>

  <script>
    const diagramExports = [
      {
        id: "01-1",
        group: "overview",
        title: "전체 서비스 흐름 1 - 슬롯 예약",
        desc: "수확 슬롯 오픈부터 고객 예약 점유까지의 핵심 흐름",
        png: "01_overview_end_to_end_1_slot_reservation.png",
        svg: "01_overview_end_to_end_1_slot_reservation.svg"
      },
      {
        id: "01-2",
        group: "overview",
        title: "전체 서비스 흐름 2 - 주문·발주·배송·반품",
        desc: "주문 생성 이후 결제, 점주 발주, 품질 확인, 배송, 반품으로 이어지는 흐름",
        png: "01_overview_end_to_end_2_order_fulfillment_return.png",
        svg: "01_overview_end_to_end_2_order_fulfillment_return.svg"
      },
      {
        id: "02",
        group: "workflows",
        title: "점주 수확 슬롯 설정",
        desc: "ML 예측 결과를 바탕으로 판매 가능한 수확 슬롯을 오픈하는 점주 흐름",
        png: "02_owner_supply_slot_setup.png",
        svg: "02_owner_supply_slot_setup.svg"
      },
      {
        id: "03",
        group: "workflows",
        title: "고객 예약 생성",
        desc: "상품 상세에서 수량을 선택하고 서버 예약을 생성하는 고객 예약 흐름",
        png: "03_customer_reservation.png",
        svg: "03_customer_reservation.svg"
      },
      {
        id: "04",
        group: "workflows",
        title: "주문·결제·발주 요청",
        desc: "예약 상태 검증, 주문 생성, Mock 결제 승인, 발주 요청 생성 흐름",
        png: "04_order_payment_procurement.png",
        svg: "04_order_payment_procurement.svg"
      },
      {
        id: "05",
        group: "workflows",
        title: "점주 발주·품질·배송 처리",
        desc: "발주 승인 또는 거절, 신선도 검사, 배송 준비와 송장 등록 흐름",
        png: "05_owner_fulfillment_quality_shipping.png",
        svg: "05_owner_fulfillment_quality_shipping.svg"
      },
      {
        id: "06",
        group: "workflows",
        title: "반품·환불 처리",
        desc: "고객 반품 요청부터 점주 승인, 환불 처리, 거래 종료까지의 흐름",
        png: "06_return_refund.png",
        svg: "06_return_refund.svg"
      },
      {
        id: "07-1",
        group: "states",
        title: "상태 생명주기 1 - 예약·주문·발주",
        desc: "RESERVED에서 PAYMENT_PENDING, PAID, PROCUREMENT_REQUESTED로 이어지는 상태 전이",
        png: "07_state_lifecycle_1_order_procurement.png",
        svg: "07_state_lifecycle_1_order_procurement.svg"
      },
      {
        id: "07-2",
        group: "states",
        title: "상태 생명주기 2 - 출고·배송",
        desc: "발주 승인 이후 QUALITY_CHECKING, READY_TO_SHIP, SHIPPED, DELIVERED 상태 전이",
        png: "07_state_lifecycle_2_fulfillment_shipping.png",
        svg: "07_state_lifecycle_2_fulfillment_shipping.svg"
      },
      {
        id: "07-3",
        group: "states",
        title: "상태 생명주기 3 - 반품·환불",
        desc: "DELIVERED 이후 반품 요청, 반품 승인 또는 거절, 환불 완료까지의 상태 전이",
        png: "07_state_lifecycle_3_return_refund.png",
        svg: "07_state_lifecycle_3_return_refund.svg"
      }
    ];

    function esc(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[char]);
    }

    function renderDiagramExports() {
      const groups = [
        ["overview", "01. 전체 흐름 다이어그램", "서비스 시작부터 주문·배송·반품까지 이어지는 큰 흐름입니다. PPT에서는 개요 설명용으로 따로 사용합니다."],
        ["workflows", "02-06. 업무 처리 다이어그램", "고객과 점주가 실제 화면에서 수행하는 주요 업무 처리 흐름입니다."],
        ["states", "07. 상태 생명주기 다이어그램", "주문, 출고, 반품·환불 상태값이 어떻게 전이되는지 정리한 상태 중심 흐름입니다."]
      ];
      const grid = document.getElementById("diagramGrid");
      grid.innerHTML = groups.map(([groupId, title, desc]) => {
        const items = diagramExports.filter(item => item.group === groupId);
        return `
          <section class="diagram-group" aria-labelledby="group-${esc(groupId)}">
            <h3 id="group-${esc(groupId)}" class="diagram-group-title">${esc(title)}</h3>
            <p class="diagram-group-desc">${esc(desc)}</p>
            <div class="diagram-grid">
              ${items.map(item => `
                <article class="diagram-card">
                  <div class="diagram-info">
                    <span class="diagram-id">${esc(item.id)}</span>
                    <div>
                      <h4 class="diagram-title">${esc(item.title)}</h4>
                      <p class="diagram-desc">${esc(item.desc)}</p>
                    </div>
                    <div class="diagram-links">
                      <a href="${esc(item.png)}" target="_blank" rel="noopener">PNG</a>
                      <a href="${esc(item.svg)}" target="_blank" rel="noopener">SVG</a>
                    </div>
                  </div>
                  <a href="${esc(item.png)}" target="_blank" rel="noopener" aria-label="${esc(item.title)} PNG 열기">
                    <img class="diagram-preview" src="${esc(item.png)}" alt="${esc(item.title)}">
                  </a>
                </article>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    renderDiagramExports();
  </script>
</body>
</html>
