<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2240" viewBox="0 0 1600 2240">
  <defs>
    <style>
      .page { fill: #fbfaf7; }
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #16211f; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 21px; font-weight: 600; fill: #53615d; }
      .code { font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #1f5a42; }
      .lane { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      .node-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111817; text-anchor: middle; }
      .node-sub { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #53615d; text-anchor: middle; }
      .state-code { font-family: Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #49615b; text-anchor: middle; }
      .edge { fill: none; stroke: #1f2933; stroke-width: 4; }
      .edge-soft { fill: none; stroke: #6f7b76; stroke-width: 3; }
      .arrowhead { fill: #1f2933; }
      .arrowhead-soft { fill: #6f7b76; }
      .yesno { font-family: Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #111817; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2240"/>
  <rect x="42" y="42" width="1516" height="2156" fill="none" stroke="#cfd8d2" stroke-width="2"/>

  <text class="code" x="96" y="110">07-1</text>
  <text class="title" x="170" y="112">예약·주문·발주 상태 생명주기</text>
  <text class="subtitle" x="96" y="160">수확 슬롯 점유가 주문, 결제, 발주 요청으로 이어지는 상태 전이</text>

  <g id="lanes">
    <rect x="112" y="278" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="306">슬롯</text>
    <rect x="112" y="544" width="126" height="42" rx="21" fill="#496fae"/>
    <text class="lane" x="175" y="572">예약</text>
    <rect x="112" y="984" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="1012">주문</text>
    <rect x="112" y="1488" width="126" height="42" rx="21" fill="#596d82"/>
    <text class="lane" x="175" y="1516">결제</text>
    <rect x="112" y="1760" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="1788">발주</text>
  </g>

  <g id="flow">
    <rect x="540" y="235" width="520" height="116" rx="58" fill="#d9ebff" stroke="#4d7fc7" stroke-width="4"/>
    <text class="node-title" x="800" y="286">시작</text>
    <text class="node-sub" x="800" y="322">수확 슬롯 OPEN</text>

    <path class="edge" d="M800 351 L800 422"/>
    <rect x="540" y="422" width="520" height="116" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="468">예약 점유</text>
    <text class="state-code" x="800" y="506">RESERVED</text>

    <path class="edge" d="M800 538 L800 610"/>
    <polygon points="800,610 1130,760 800,910 470,760" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="724">주문으로</text>
    <text class="node-title" x="800" y="764">전환되었는가?</text>
    <text class="node-sub" x="800" y="812">예약 만료 전 주문 필요</text>

    <path class="edge-soft" d="M470 760 L392 760"/>
    <text class="yesno" x="420" y="738">N</text>
    <rect x="124" y="690" width="268" height="140" rx="10" fill="#fff6e6" stroke="#9b6b28" stroke-width="3"/>
    <text class="node-title" x="258" y="740">예약 종료</text>
    <text class="state-code" x="258" y="778">EXPIRED</text>
    <text class="state-code" x="258" y="808">CANCELED</text>

    <path class="edge" d="M800 910 L800 982"/>
    <text class="yesno" x="858" y="946">Y</text>
    <rect x="540" y="982" width="520" height="116" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1028">주문 생성</text>
    <text class="state-code" x="800" y="1066">PAYMENT_PENDING</text>

    <path class="edge" d="M800 1098 L800 1170"/>
    <polygon points="800,1170 1130,1320 800,1470 470,1320" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1284">결제가</text>
    <text class="node-title" x="800" y="1324">승인되었는가?</text>
    <text class="node-sub" x="800" y="1372">Mock 결제 결과</text>

    <path class="edge-soft" d="M470 1320 L392 1320"/>
    <text class="yesno" x="420" y="1298">N</text>
    <rect x="124" y="1250" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="1300">결제 미완료</text>
    <text class="state-code" x="258" y="1338">FAILED</text>
    <text class="state-code" x="258" y="1368">CANCELED</text>

    <path class="edge" d="M800 1470 L800 1542"/>
    <text class="yesno" x="858" y="1506">Y</text>
    <rect x="540" y="1542" width="520" height="116" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1588">결제 완료</text>
    <text class="state-code" x="800" y="1626">PAID / APPROVED</text>

    <path class="edge" d="M800 1658 L800 1730"/>
    <rect x="540" y="1730" width="520" height="116" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1776">발주 요청</text>
    <text class="state-code" x="800" y="1814">PROCUREMENT_REQUESTED</text>

    <path class="edge" d="M800 1846 L800 1918"/>
    <polygon points="800,1918 1130,2068 800,2160 470,2068" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="2032">다음 상태</text>
    <text class="node-title" x="800" y="2072">점주 발주 결정</text>
    <text class="node-sub" x="800" y="2120">07-2로 연결</text>

    <polygon class="arrowhead" points="800,422 784,390 816,390"/>
    <polygon class="arrowhead" points="800,610 784,578 816,578"/>
    <polygon class="arrowhead-soft" points="392,760 424,744 424,776"/>
    <polygon class="arrowhead" points="800,982 784,950 816,950"/>
    <polygon class="arrowhead" points="800,1170 784,1138 816,1138"/>
    <polygon class="arrowhead-soft" points="392,1320 424,1304 424,1336"/>
    <polygon class="arrowhead" points="800,1542 784,1510 816,1510"/>
    <polygon class="arrowhead" points="800,1730 784,1698 816,1698"/>
    <polygon class="arrowhead" points="800,1918 784,1886 816,1886"/>
  </g>
</svg>
