<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2360" viewBox="0 0 1600 2360">
  <defs>
    <style>
      .page { fill: #fbfaf7; }
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #16211f; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 21px; font-weight: 600; fill: #53615d; }
      .code { font-family: Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #1f5a42; }
      .lane { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      .node-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #111817; text-anchor: middle; }
      .node-sub { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #53615d; text-anchor: middle; }
      .edge { fill: none; stroke: #1f2933; stroke-width: 4; }
      .edge-soft { fill: none; stroke: #6f7b76; stroke-width: 3; }
      .arrowhead { fill: #1f2933; }
      .arrowhead-soft { fill: #6f7b76; }
      .yesno { font-family: Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #111817; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2360"/>
  <rect x="42" y="42" width="1516" height="2276" fill="none" stroke="#cfd8d2" stroke-width="2"/>

  <text class="code" x="96" y="110">04</text>
  <text class="title" x="158" y="112">주문·결제·발주 생성 플로우</text>
  <text class="subtitle" x="96" y="160">예약 점유 상태를 주문과 결제로 전환하고 점주 발주 요청을 자동 생성하는 흐름</text>

  <g id="lanes">
    <rect x="112" y="278" width="126" height="42" rx="21" fill="#496fae"/>
    <text class="lane" x="175" y="306">고객</text>
    <rect x="112" y="776" width="126" height="42" rx="21" fill="#7a6044"/>
    <text class="lane" x="175" y="804">서버</text>
    <rect x="112" y="1258" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="1286">DB</text>
    <rect x="112" y="2036" width="126" height="42" rx="21" fill="#2f6f53"/>
    <text class="lane" x="175" y="2064">점주</text>
  </g>

  <g id="flow">
    <rect x="540" y="235" width="520" height="116" rx="58" fill="#d9ebff" stroke="#4d7fc7" stroke-width="4"/>
    <text class="node-title" x="800" y="286">시작</text>
    <text class="node-sub" x="800" y="322">예약 생성 완료</text>

    <path class="edge" d="M800 351 L800 422"/>
    <polygon points="626,422 1130,422 974,562 470,562" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="478">주문서 작성</text>
    <text class="node-sub" x="800" y="516">수령인, 연락처, 주소</text>
    <text class="node-sub" x="800" y="546">배송 메모 입력</text>

    <path class="edge" d="M800 562 L800 634"/>
    <polygon points="800,634 1130,784 800,934 470,784" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="748">예약 상태가</text>
    <text class="node-title" x="800" y="788">유효한가?</text>
    <text class="node-sub" x="800" y="836">RESERVED 및 만료 전</text>

    <path class="edge-soft" d="M470 784 L420 784 L420 900 L392 900"/>
    <text class="yesno" x="438" y="762">N</text>
    <rect x="124" y="830" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="880">주문 불가</text>
    <text class="node-sub" x="258" y="918">예약 만료 또는</text>
    <text class="node-sub" x="258" y="948">취소 상태 안내</text>

    <path class="edge" d="M800 934 L800 1006"/>
    <text class="yesno" x="858" y="970">Y</text>
    <rect x="540" y="1006" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1056">주문 생성</text>
    <text class="node-sub" x="800" y="1093">orders, order_items 생성</text>
    <text class="node-sub" x="800" y="1123">PAYMENT_PENDING 상태</text>

    <path class="edge" d="M800 1138 L800 1210"/>
    <polygon points="626,1210 1130,1210 974,1350 470,1350" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1266">Mock 결제 요청</text>
    <text class="node-sub" x="800" y="1304">주문 금액 확인</text>
    <text class="node-sub" x="800" y="1334">결제 승인 버튼</text>

    <path class="edge" d="M800 1350 L800 1422"/>
    <polygon points="800,1422 1130,1572 800,1722 470,1572" fill="#fffdf9" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="1536">결제가</text>
    <text class="node-title" x="800" y="1576">승인되었는가?</text>
    <text class="node-sub" x="800" y="1624">Mock 승인 결과</text>

    <path class="edge-soft" d="M470 1572 L392 1572"/>
    <text class="yesno" x="420" y="1550">N</text>
    <rect x="124" y="1502" width="268" height="140" rx="10" fill="#fff0ef" stroke="#b64b4b" stroke-width="3"/>
    <text class="node-title" x="258" y="1552">결제 실패</text>
    <text class="node-sub" x="258" y="1590">주문은 결제 대기</text>
    <text class="node-sub" x="258" y="1620">다시 결제 안내</text>

    <path class="edge" d="M800 1722 L800 1794"/>
    <text class="yesno" x="858" y="1758">Y</text>
    <path d="M610 1846 C610 1812 990 1812 990 1846 L990 1986 C990 2020 610 2020 610 1986 Z" fill="#e4f7ed" stroke="#247a55" stroke-width="4"/>
    <ellipse cx="800" cy="1846" rx="190" ry="46" fill="#f2fff8" stroke="#247a55" stroke-width="4"/>
    <text class="node-title" x="800" y="1936">결제 결과 반영</text>
    <text class="node-sub" x="800" y="1978">payments APPROVED</text>

    <path class="edge" d="M800 2024 L800 2096"/>
    <rect x="540" y="2096" width="520" height="132" rx="10" fill="#ffffff" stroke="#202825" stroke-width="4"/>
    <text class="node-title" x="800" y="2146">슬롯 수량 이동</text>
    <text class="node-sub" x="800" y="2183">reserved_kg 감소</text>
    <text class="node-sub" x="800" y="2213">sold_kg 증가</text>

    <path class="edge" d="M1060 2162 L1210 2162"/>
    <path d="M1210 2092 C1210 2058 1490 2058 1490 2092 L1490 2232 C1490 2266 1210 2266 1210 2232 Z" fill="#e4f7ed" stroke="#247a55" stroke-width="4"/>
    <ellipse cx="1350" cy="2092" rx="140" ry="42" fill="#f2fff8" stroke="#247a55" stroke-width="4"/>
    <text class="node-title" x="1350" y="2174">발주 자동 생성</text>
    <text class="node-sub" x="1350" y="2212">procurements 기록</text>

    <path class="edge" d="M800 2228 L800 2292"/>
    <rect x="540" y="2292" width="520" height="52" rx="26" fill="#dff5e9" stroke="#2f7c59" stroke-width="4"/>
    <text class="node-title" x="800" y="2327">점주 발주 확인 대기</text>

    <polygon class="arrowhead" points="800,422 784,390 816,390"/>
    <polygon class="arrowhead" points="800,634 784,602 816,602"/>
    <polygon class="arrowhead-soft" points="392,900 424,884 424,916"/>
    <polygon class="arrowhead" points="800,1006 784,974 816,974"/>
    <polygon class="arrowhead" points="800,1210 784,1178 816,1178"/>
    <polygon class="arrowhead" points="800,1422 784,1390 816,1390"/>
    <polygon class="arrowhead-soft" points="392,1572 424,1556 424,1588"/>
    <polygon class="arrowhead" points="800,1794 784,1762 816,1762"/>
    <polygon class="arrowhead" points="800,2096 784,2064 816,2064"/>
    <polygon class="arrowhead" points="1210,2162 1178,2146 1178,2178"/>
    <polygon class="arrowhead" points="800,2292 784,2260 816,2260"/>
  </g>
</svg>
